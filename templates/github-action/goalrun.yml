# GoalRun CI check
# Add this to .github/workflows/ to validate goals and skills on every PR

name: GoalRun Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  goalrun:
    runs-on: ubuntu-latest
    env:
      GOALRUN_VERSION: alpha
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install GoalRun
        run: npm install --global "goalrun@${GOALRUN_VERSION}"

      - name: GoalRun lint
        run: goalrun lint --json

      - name: GoalRun test
        run: goalrun test --json

      - name: GoalRun verify all goals
        run: |
          for goal in .goalrun/goals/*.yaml; do
            goalrun verify "$goal" --json
          done
